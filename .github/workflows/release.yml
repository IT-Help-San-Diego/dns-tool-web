name: Release with SHA-256 Checksums

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  checksums:
    name: Generate SHA-256 checksums
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Get tag name
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Download source archives
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          REPO="${GITHUB_REPOSITORY}"
          curl -sL "https://github.com/${REPO}/archive/refs/tags/${TAG}.zip" \
            -o "dns-tool-web-${{ steps.tag.outputs.version }}.zip"
          curl -sL "https://github.com/${REPO}/archive/refs/tags/${TAG}.tar.gz" \
            -o "dns-tool-web-${{ steps.tag.outputs.version }}.tar.gz"

      - name: Generate SHA-256 checksums
        run: |
          sha256sum dns-tool-web-${{ steps.tag.outputs.version }}.zip \
                    dns-tool-web-${{ steps.tag.outputs.version }}.tar.gz \
            > SHA256SUMS
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS

      - name: Sign checksums with commit hash
        run: |
          echo "" >> SHA256SUMS
          echo "# Generated from tag ${GITHUB_REF#refs/tags/} at commit ${GITHUB_SHA}" >> SHA256SUMS
          echo "# Verify: sha256sum -c SHA256SUMS" >> SHA256SUMS

      - name: Attach checksums to release
        uses: softprops/action-gh-release@v2
        with:
          files: SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
