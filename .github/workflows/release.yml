name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build binary
        run: |
          cd go-server
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "-s -w" -o ../dns-tool-server-linux-amd64 ./cmd/server

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Generate SHA256SUMS
        run: |
          sha256sum dns-tool-server-linux-amd64 > SHA256SUMS
          cat SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "scientific release workflow"
          body: |
            ## DNS Tool ${{ github.ref_name }}

            All versioned artifacts bumped to ${{ steps.version.outputs.version }}.
            PDFs regenerated. Quality gates passed.

            ### Verification
            ```
            sha256sum -c SHA256SUMS
            ```
          files: |
            dns-tool-server-linux-amd64
            SHA256SUMS
          generate_release_notes: true
