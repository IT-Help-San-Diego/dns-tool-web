name: CI — Build & Test

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Detect repo role
        id: role
        run: |
          if [[ "${{ github.repository }}" == *"-intel" ]]; then
            echo "tags=-tags intel" >> "$GITHUB_OUTPUT"
            echo "role=intel" >> "$GITHUB_OUTPUT"
          else
            echo "tags=" >> "$GITHUB_OUTPUT"
            echo "role=web" >> "$GITHUB_OUTPUT"
          fi

      - name: Build binary
        run: |
          cd go-server
          CGO_ENABLED=0 go build ${{ steps.role.outputs.tags }} -ldflags "-s -w" -o ../dns-tool-server ./cmd/server
        env:
          DNS_TOOL_REPO_ROLE: ${{ steps.role.outputs.role }}

      - name: Run tests
        run: |
          go test ./go-server/... ${{ steps.role.outputs.tags }} \
            -skip 'NoIntelInPublicRepo|NoIntelLeakage|NoIntelStagingDirectory|BoundaryIntegrity_FullRepoScan|IsOriginVisible|EdgeCDNMapsEmpty|GoldenRuleStubBoundary|ScrutinyClassificationAllFiles' \
            -count=1 -short -timeout 300s -parallel=2
        env:
          CGO_ENABLED: '0'
          DNS_TOOL_REPO_ROLE: ${{ steps.role.outputs.role }}
          GOGC: '50'
          GOMEMLIMIT: '6000MiB'

      - name: Verify binary
        run: |
          ls -lh dns-tool-server
          file dns-tool-server
